# =============================================================================
# Life Simulator — Android Build Pipeline
# =============================================================================
# Triggers:
#   - push to main / develop
#   - tags matching v*
#   - manual workflow_dispatch
#
# Notes:
#   - Generates android/ platform directories via flutter create
#   - Debug APK: unsigned, for testing
#   - Release AAB: signed (requires keystore secrets)
# =============================================================================

name: Build Android APK

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FLUTTER_VERSION: '3.22.x'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Analyze & Test
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Generate android/ directory if it doesn't exist in the repo
      - name: Create platform projects
        run: flutter create --platforms=android --project-name life_simulator .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Run tests
        run: |
          if [ -d test ] && [ "$(ls -A test 2>/dev/null)" ]; then
            flutter test --coverage
          else
            echo "No tests found — skipping test step"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Build Debug APK  (unsigned — works with default debug keystore)
  # ---------------------------------------------------------------------------
  build-debug:
    name: Build Debug APK
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event.inputs.build_type != 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}

      - name: Create platform projects
        run: flutter create --platforms=android --project-name life_simulator .

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: life-simulator-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. Build Release AAB  (signed — requires repository secrets)
  # ---------------------------------------------------------------------------
  build-release:
    name: Build Release AAB
    needs: validate
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.build_type == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}

      - name: Create platform projects
        run: flutter create --platforms=android --project-name life_simulator .

      - name: Install dependencies
        run: flutter pub get

      # --- Keystore setup ---------------------------------------------------
      # Requires these secrets to be set in the repository:
      #   ANDROID_KEYSTORE_BASE64  — base64-encoded .jks keystore file
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      # ----------------------------------------------------------------------
      - name: Decode keystore
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "keystore_available=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret not set."
            echo "A debug build will be produced instead."
          else
            mkdir -p android/app
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
            echo "keystore_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create key.properties
        if: steps.decode_keystore.outputs.keystore_available == 'true'
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release appbundle
        if: steps.decode_keystore.outputs.keystore_available == 'true'
        run: flutter build appbundle --release

      # Fallback: build debug APK when secrets are missing
      - name: Build debug APK (fallback)
        if: steps.decode_keystore.outputs.keystore_available != 'true'
        run: flutter build apk --debug

      - name: Upload AAB
        if: steps.decode_keystore.outputs.keystore_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: life-simulator-release
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK (fallback)
        if: steps.decode_keystore.outputs.keystore_available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: life-simulator-debug-from-release
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 4. Generate release notes (tagged builds only)
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: life-simulator-release
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Life Simulator v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: dist/app-release.aab
          draft: true
          prerelease: false
